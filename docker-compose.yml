services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ./server
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://nomikai:nomikai_password@db:5432/nomikai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nomikai}
      POSTGRES_USER: ${POSTGRES_USER:-nomikai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nomikai_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nomikai} -d ${POSTGRES_DB:-nomikai}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  web_node_modules:
  api_node_modules:
  postgres_data:
  redis_data:
