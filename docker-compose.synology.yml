services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: "${VITE_API_URL:?Set VITE_API_URL to the browser-visible API URL, for example http://192.168.1.10:3000}"
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: sh -c "npm run build && npm start"
    environment:
      PORT: 3000
      DATABASE_URL: "postgres://${POSTGRES_USER:-nomikai}:${POSTGRES_PASSWORD:-nomikai}@db:5432/${POSTGRES_DB:-nomikai}"
      REDIS_URL: redis://redis:6379
      CLIENT_ORIGIN: "${CLIENT_ORIGIN:?Set CLIENT_ORIGIN to the browser origin, for example http://192.168.1.10:5173}"
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-nomikai}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-nomikai}"
      POSTGRES_DB: "${POSTGRES_DB:-nomikai}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nomikai} -d ${POSTGRES_DB:-nomikai}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
